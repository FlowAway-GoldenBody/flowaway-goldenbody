<!DOCTYPE html>
<html>
<head>
  <title>Process Persistence Test</title>
</head>
<body>
  <h1>Process Persistence Test</h1>
  <div id="results"></div>
  <script>
    (function() {
      var results = [];
      var resultsDiv = document.getElementById('results');

      function log(test, passed, message) {
        var status = passed ? '✓ PASS' : '✗ FAIL';
        results.push({ test: test, passed: passed, message: message });
        console.log(status + ': ' + test + ' - ' + message);
        var p = document.createElement('p');
        p.style.color = passed ? 'green' : 'red';
        p.textContent = status + ': ' + test + ' - ' + message;
        resultsDiv.appendChild(p);
      }

      // Test 1: Event Listener Process Persistence
      function testListenerPersistence() {
        setTimeout(function() {
          if (!window.runtime || !window.runtime.processes) {
            log('Listener Persistence', false, 'runtime.processes not available');
            return;
          }

          var initialCount = window.runtime.processes.length;
          var testListener = function() { console.log('test'); };
          
          window.addEventListener('custom-test-event', testListener);
          var afterRegisterCount = window.runtime.processes.length;
          
          // Find the listener process
          var listenerProcess = null;
          for (var i = afterRegisterCount - 1; i >= Math.max(0, afterRegisterCount - 10); i--) {
            if (window.runtime.processes[i] && window.runtime.processes[i].title && window.runtime.processes[i].title.indexOf('Listener') !== -1) {
              listenerProcess = window.runtime.processes[i];
              break;
            }
          }

          if (!listenerProcess) {
            log('Listener Persistence', false, 'Listener process not created');
            return;
          }

          var listenerPid = listenerProcess.pid;
          window.removeEventListener('custom-test-event', testListener);
          
          var afterRemoveCount = window.runtime.processes.length;
          var processAfterRemove = null;
          for (var i = 0; i < window.runtime.processes.length; i++) {
            if (window.runtime.processes[i] && window.runtime.processes[i].pid === listenerPid) {
              processAfterRemove = window.runtime.processes[i];
              break;
            }
          }

          if (processAfterRemove) {
            log('Listener Persistence', true, 'Listener process remains in array after removeEventListener (PID: ' + listenerPid + ')');
          } else {
            log('Listener Persistence', false, 'Listener process was killed when removeEventListener called');
          }

          // Test handler storage
          if (listenerProcess.handler) {
            log('Listener Handler Storage', true, 'Handler stored in listener process');
          } else {
            log('Listener Handler Storage', false, 'Handler not stored in listener process');
          }
        }, 100);
      }

      // Test 2: Timer Process Persistence
      function testTimerPersistence() {
        setTimeout(function() {
          if (!window.runtime || !window.runtime.processes) {
            log('Timer Persistence', false, 'runtime.processes not available');
            return;
          }

          var testCallback = function() { console.log('timer'); };
          var timerId = window.setTimeout(testCallback, 5000);
          
          // Find the timer process
          var timerProcess = null;
          var timerProcessIndex = -1;
          for (var i = window.runtime.processes.length - 1; i >= Math.max(0, window.runtime.processes.length - 10); i--) {
            if (window.runtime.processes[i] && window.runtime.processes[i].type === 'timer') {
              timerProcess = window.runtime.processes[i];
              timerProcessIndex = i;
              break;
            }
          }

          if (!timerProcess) {
            log('Timer Persistence', false, 'Timer process not created');
            return;
          }

          var timerPid = timerProcess.pid;
          window.clearTimeout(timerId);
          
          var processAfterClear = null;
          for (var i = 0; i < window.runtime.processes.length; i++) {
            if (window.runtime.processes[i] && window.runtime.processes[i].pid === timerPid) {
              processAfterClear = window.runtime.processes[i];
              break;
            }
          }

          if (processAfterClear) {
            log('Timer Persistence', true, 'Timer process remains in array after clearTimeout (PID: ' + timerPid + ')');
          } else {
            log('Timer Persistence', false, 'Timer process was killed when clearTimeout called');
          }

          // Test handler storage
          if (timerProcess.handler) {
            log('Timer Handler Storage', true, 'Handler stored in timer process');
          } else {
            log('Timer Handler Storage', false, 'Handler not stored in timer process');
          }
        }, 150);
      }

      // Test 3: Interval Process Persistence
      function testIntervalPersistence() {
        setTimeout(function() {
          if (!window.runtime || !window.runtime.processes) {
            log('Interval Persistence', false, 'runtime.processes not available');
            return;
          }

          var testCallback = function() { console.log('interval'); };
          var intervalId = window.setInterval(testCallback, 1000);
          
          // Find the interval process
          var intervalProcess = null;
          for (var i = window.runtime.processes.length - 1; i >= Math.max(0, window.runtime.processes.length - 10); i--) {
            if (window.runtime.processes[i] && window.runtime.processes[i].type === 'timer' && window.runtime.processes[i].options && window.runtime.processes[i].options.timerKind === 'interval') {
              intervalProcess = window.runtime.processes[i];
              break;
            }
          }

          if (!intervalProcess) {
            log('Interval Persistence', false, 'Interval process not created');
            return;
          }

          var intervalPid = intervalProcess.pid;
          window.clearInterval(intervalId);
          
          var processAfterClear = null;
          for (var i = 0; i < window.runtime.processes.length; i++) {
            if (window.runtime.processes[i] && window.runtime.processes[i].pid === intervalPid) {
              processAfterClear = window.runtime.processes[i];
              break;
            }
          }

          if (processAfterClear) {
            log('Interval Persistence', true, 'Interval process remains in array after clearInterval (PID: ' + intervalPid + ')');
          } else {
            log('Interval Persistence', false, 'Interval process was killed when clearInterval called');
          }

          // Test handler storage
          if (intervalProcess.handler) {
            log('Interval Handler Storage', true, 'Handler stored in interval process');
          } else {
            log('Interval Handler Storage', false, 'Handler not stored in interval process');
          }
        }, 200);
      }

      // Run tests
      testListenerPersistence();
      testTimerPersistence();
      testIntervalPersistence();

      // Summary after all tests
      setTimeout(function() {
        var passed = results.filter(function(r) { return r.passed; }).length;
        var total = results.length;
        var summaryP = document.createElement('p');
        summaryP.style.fontSize = '1.2em';
        summaryP.style.fontWeight = 'bold';
        summaryP.textContent = 'Summary: ' + passed + ' / ' + total + ' tests passed';
        summaryP.style.color = passed === total ? 'green' : 'red';
        resultsDiv.appendChild(summaryP);
        
        // Also log to console for headless verification
        console.log('TEST_SUMMARY: ' + passed + '/' + total);
        if (passed === total) {
          console.log('ALL_TESTS_PASSED');
        }
      }, 500);
    })();
  </script>
</body>
</html>
